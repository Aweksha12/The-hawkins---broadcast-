openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Hawkins Emergency Broadcast API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Broadcast session operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /sessions:
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new broadcast session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session info
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/{sessionId}/state:
    get:
      operationId: getPlaybackState
      tags: [sessions]
      summary: Get current playback state
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Playback state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackState"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateSessionRequest:
      type: object
      properties:
        broadcasterName:
          type: string
        videoUrl:
          type: string
      required:
        - broadcasterName
    Session:
      type: object
      properties:
        id:
          type: string
        broadcasterName:
          type: string
        videoUrl:
          type: string
          nullable: true
        listenerCount:
          type: number
        createdAt:
          type: string
      required:
        - id
        - broadcasterName
        - listenerCount
        - createdAt
    PlaybackState:
      type: object
      properties:
        isPlaying:
          type: boolean
        currentTime:
          type: number
        duration:
          type: number
        updatedAt:
          type: number
        videoUrl:
          type: string
          nullable: true
      required:
        - isPlaying
        - currentTime
        - duration
        - updatedAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
