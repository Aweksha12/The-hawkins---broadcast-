services:
  - type: web
    name: hawkins-broadcast
    env: node
    buildCommand: |
      npx pnpm@9.12.0 install --config.frozen-lockfile=false
      export PORT=5173
      export BASE_PATH=/
      npx pnpm@9.12.0 --filter @workspace/hawkins-broadcast run build
      npx pnpm@9.12.0 --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/healthz
    autoDeploy: true
