packages:
  "framer-motion": "Page transitions, retro flicker effects, and smooth animations"
  "clsx": "Conditional class merging for UI components"
  "tailwind-merge": "Merging tailwind classes safely"
  "lucide-react": "Retro-themed icons for the media player and UI"

images:
