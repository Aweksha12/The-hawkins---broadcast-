kind = "web"
previewPath = "/"
title = "Hawkins Emergency Broadcast"
version = "1.0.0"
id = "artifacts/hawkins-broadcast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18381
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hawkins-broadcast run dev"

[services.env]
PORT = "18381"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hawkins-broadcast", "run", "build"]
publicDir = "artifacts/hawkins-broadcast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
